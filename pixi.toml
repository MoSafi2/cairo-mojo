[workspace]
authors = ["MoSafi2 <mohamed.mabrouk@rwth-aachen.de>"]
channels = ["https://conda.modular.com/max-nightly/", "conda-forge"]
name = "cairo-mojo"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
# Tests use CairoLib (dynamic loading via OwnedDLHandle); no link-time -lcairo needed.
test-cairo = "mojo run test_cairo_bindings.mojo"

[dependencies]
python = ">=3.14.3,<3.15"
ipykernel = "*"
mojo = "==0.26.1.0"

[pypi-dependencies]
libclang = ">=18.1.1, <19"
