[workspace]
authors = ["MoSafi2 <mohamed.mabrouk@rwth-aachen.de>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "cairo-mojo"
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]
preview = ["pixi-build"]
version = "0.1.0"

[package]
name = "cairo-mojo"
version = "0.1.0"
description = "Mojo bindings and higher-level wrapper for cairo"
license = "MIT"

[package.build]
backend = { name = "pixi-build-mojo", version = "0.*" }
source = { path = "." }

[package.build.config]
extra-input-globs = [
    "README.md",
    "LICENSE",
    "CHANGELOG.md",
    "examples/**/*.mojo",
    "test/**/*.mojo",
]

[package.build.config.pkg]
name = "cairo_mojo"
path = "$RECIPE_DIR/cairo_mojo"

[dependencies]
mojo = "<0.27"
cairo = ">=1.18,<2"

[tasks]
build = "pixi build"
package-artifacts = "pixi build --output-dir dist/conda"

verify-import = "pixi run mojo run test/package_smoke_install.mojo"
verify-install = "pixi run verify-import"

test = "pixi run test-unit-install && pixi run test-functional"
test-unit-install = "pixi run mojo run test/test_install_unit.mojo && pixi run mojo run test/package_smoke_install.mojo"
test-functional = "pixi run mojo run test/test_ffi_smoke.mojo && pixi run mojo run test/test_high_level_api.mojo"

[package.host-dependencies]
mojo = "<0.27"
cairo = ">=1.18,<2"

[package.build-dependencies]
mojo = "<0.27"
cairo = ">=1.18,<2"

[package.run-dependencies]
mojo = "<0.27"
cairo = ">=1.18,<2"

[feature.dev.dependencies]
# keep the runtime stack explicit in the dev env too
mojo = "<0.27"
cairo = ">=1.18,<2"

[feature.dev.pypi-dependencies]
mojo-bindgen = { git = "https://github.com/MoSafi2/mojo_bindgen" }

[feature.dev.dependencies.libclang]
version = "*"

[environments]
default = []
dev = ["dev"]